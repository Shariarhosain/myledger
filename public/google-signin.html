<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In with Google - Therellwalker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🔐 Therellwalker</h1>
            <p class="text-gray-600">Welcome back! Sign in to continue</p>
        </div>

        <!-- Main Card -->
        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-purple-500 to-pink-600 p-6">
                <h2 class="text-2xl font-bold text-white text-center">Sign In</h2>
                <p class="text-purple-100 text-center mt-2">Access your account with Google</p>
            </div>

            <div class="p-8">
                <!-- Info Box -->
                <div class="bg-purple-50 border-l-4 border-purple-500 p-4 mb-6 rounded">
                    <div class="flex items-start">
                        <div class="flex-shrink-0">
                            <svg class="h-5 w-5 text-purple-500" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm text-purple-700">
                                Sign in with the same Google account you used to register.
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Google Sign-In Button -->
                <div class="flex justify-center mb-6">
                    <div id="g_id_onload"
                         data-client_id="823212933581-1t0g20kji86ra7rdapcbp51emd6n2lik.apps.googleusercontent.com"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleGoogleSignIn"
                         data-auto_prompt="false">
                    </div>
                    
                    <div class="g_id_signin" 
                         data-type="standard"
                         data-shape="rectangular"
                         data-theme="filled_blue"
                         data-text="signin_with"
                         data-size="large"
                         data-logo_alignment="left"
                         data-width="320">
                    </div>
                </div>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-500">or</span>
                    </div>
                </div>

                <!-- Sign Up Link -->
                <div class="text-center">
                    <p class="text-gray-600">Don't have an account?</p>
                    <a href="./google-signup.html" class="text-purple-600 hover:text-purple-800 font-semibold hover:underline">
                        Sign Up Here →
                    </a>
                </div>

                <!-- Response Area -->
                <div id="response-area" class="mt-6 hidden">
                    <div id="response-content" class="p-4 rounded-lg"></div>
                </div>

                <!-- Loading Spinner -->
                <div id="loading" class="hidden text-center my-6">
                    <div class="inline-block animate-spin rounded-full h-10 w-10 border-b-2 border-purple-600"></div>
                    <p class="text-gray-600 mt-2">Signing you in...</p>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 px-8 py-4 border-t">
                <p class="text-xs text-gray-500 text-center">
                    Secure authentication powered by Google
                </p>
            </div>
        </div>

        <!-- Debug Info (Hidden in Production) -->
        <div class="max-w-md mx-auto mt-6">
            <details class="bg-white rounded-lg shadow p-4">
                <summary class="cursor-pointer font-semibold text-gray-700">🔍 Debug Information</summary>
                <div id="debug-info" class="mt-4 p-4 bg-gray-50 rounded text-xs font-mono overflow-x-auto">
                    Ready to sign in...
                </div>
            </details>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000';

        // Handle Google Sign-In Response
        async function handleGoogleSignIn(response) {
            console.log('Google Sign-In initiated:', response);
            
            const idToken = response.credential;
            
            // Show loading
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('response-area').classList.add('hidden');
            
            // Update debug info
            document.getElementById('debug-info').innerHTML = 
                `Google Token Received\n` +
                `Token Length: ${idToken.length} chars\n` +
                `Sending to backend...`;

            try {
                // Send to backend
                const apiResponse = await fetch(`${API_BASE_URL}/api/auth/google-signin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ idToken })
                });

                const data = await apiResponse.json();
                
                // Hide loading
                document.getElementById('loading').classList.add('hidden');
                
                if (apiResponse.ok && data.success) {
                    // Success
                    showResponse('success', 
                        '✅ Sign-In Successful!',
                        `Welcome back, ${data.data.user.fname}!\n\n` +
                        `Email: ${data.data.user.email}\n` +
                        `User ID: ${data.data.user.id}\n\n` +
                        `Redirecting to dashboard...`
                    );
                    
                    // Save token
                    localStorage.setItem('authToken', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // Update debug
                    document.getElementById('debug-info').innerHTML = 
                        `✅ SUCCESS!\n\n` +
                        `User: ${data.data.user.fname} ${data.data.user.lname}\n` +
                        `Email: ${data.data.user.email}\n` +
                        `Token: ${data.data.token.substring(0, 30)}...\n` +
                        `Is New User: ${data.data.isNewUser}`;
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = './dashboard.html';
                    }, 2000);
                } else {
                    throw new Error(data.message || 'Sign-in failed');
                }
            } catch (error) {
                console.error('Sign-In Error:', error);
                
                // Hide loading
                document.getElementById('loading').classList.add('hidden');
                
                // Show error
                let errorMessage = error.message;
                let suggestion = '';
                
                if (errorMessage.includes('not found') || errorMessage.includes('Please sign up')) {
                    suggestion = `\n\n💡 Account not found!\nYou need to sign up first.`;
                    setTimeout(() => {
                        window.location.href = './google-signup.html';
                    }, 3000);
                }
                
                showResponse('error', 
                    '❌ Sign-In Failed',
                    `${errorMessage}${suggestion}`
                );
                
                // Update debug
                document.getElementById('debug-info').innerHTML = 
                    `❌ ERROR\n\n` +
                    `Message: ${errorMessage}\n` +
                    `Time: ${new Date().toLocaleTimeString()}`;
            }
        }

        function showResponse(type, title, message) {
            const responseArea = document.getElementById('response-area');
            const responseContent = document.getElementById('response-content');
            
            const bgColor = type === 'success' ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500';
            const textColor = type === 'success' ? 'text-green-800' : 'text-red-800';
            const titleColor = type === 'success' ? 'text-green-900' : 'text-red-900';
            
            responseContent.className = `p-4 rounded-lg border-l-4 ${bgColor} fade-in`;
            responseContent.innerHTML = `
                <h3 class="font-bold ${titleColor} mb-2">${title}</h3>
                <p class="${textColor} whitespace-pre-line text-sm">${message}</p>
            `;
            
            responseArea.classList.remove('hidden');
        }

        // Initialize
        console.log('Sign-In page loaded');
        console.log('Backend URL:', API_BASE_URL);
    </script>
</body>
</html>
